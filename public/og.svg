<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1c1917"/>

  <!-- Subtle grid line -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#fafaf9" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#fafaf9" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Name -->
  <text
    x="80" y="220"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="400"
    fill="#fafaf9"
    letter-spacing="-0.5"
  >Alexandre Mendonça Alvaro</text>

  <!-- Divider -->
  <rect x="80" y="258" width="48" height="2" fill="#fafaf9" opacity="0.35"/>

  <!-- Role line 1 -->
  <text
    x="80" y="318"
